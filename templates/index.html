<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog → 숏폼 변환기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #7c6af7;
    --accent2: #f75f6a;
    --text: #e8e8f0;
    --muted: #666680;
    --radius: 16px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
    background-image: radial-gradient(ellipse at 20% 10%, #1a0a3e55 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 80%, #3a0a1e33 0%, transparent 50%);
  }

  header {
    text-align: center;
    margin-bottom: 56px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #1e1a3a;
    border: 1px solid #3a2e7a;
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 12px;
    color: #a090f0;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .badge::before { content: "●"; color: #7c6af7; font-size: 8px; }

  h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    line-height: 1.15;
    letter-spacing: -0.03em;
  }

  h1 span { color: var(--accent); }
  h1 em { color: var(--accent2); font-style: normal; }

  .sub {
    color: var(--muted);
    font-size: 15px;
    margin-top: 12px;
    font-weight: 300;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px;
    width: 100%;
    max-width: 620px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .input-row {
    display: flex;
    gap: 10px;
  }

  input[type=url] {
    flex: 1;
    background: #0a0a0f;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type=url]:focus { border-color: var(--accent); }
  input[type=url]::placeholder { color: #44445a; }

  button#startBtn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px 24px;
    font-family: inherit;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  button#startBtn:hover { opacity: 0.88; }
  button#startBtn:active { transform: scale(0.97); }
  button#startBtn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* 자막 옵션 */
  .subtitle-options {
    margin-top: 20px;
  }

  .subtitle-options .option-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
  }

  .radio-group {
    display: flex;
    gap: 10px;
  }

  .radio-item {
    flex: 1;
    background: #0a0a0f;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .radio-item:has(input:checked) {
    border-color: var(--accent);
    background: #1a1530;
  }

  .radio-item input[type=radio] {
    accent-color: var(--accent);
    width: 16px;
    height: 16px;
    cursor: pointer;
  }

  .radio-item span {
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
  }

  /* Progress */
  #progress { display: none; margin-top: 32px; }

  .step-label {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
  }

  .step-label span { color: var(--accent); font-weight: 600; }

  .bar-bg {
    background: var(--border);
    border-radius: 999px;
    height: 6px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 999px;
    transition: width 0.5s ease;
    width: 0%;
  }

  .scenes-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-top: 20px;
  }

  .scene-dot {
    aspect-ratio: 9/16;
    border-radius: 8px;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #44445a;
    transition: all 0.3s;
    overflow: hidden;
    position: relative;
  }

  .scene-dot.done { border: 1px solid var(--accent); }
  .scene-dot.done::after {
    content: "✓";
    color: var(--accent);
    font-size: 14px;
  }

  /* Result */
  #result { display: none; margin-top: 32px; text-align: center; }

  .result-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .result-sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }

  video {
    width: 100%;
    max-width: 280px;
    border-radius: 12px;
    border: 1px solid var(--border);
    display: block;
    margin: 0 auto 20px;
  }

  .dl-btn {
    display: inline-block;
    background: var(--accent2);
    color: #fff;
    text-decoration: none;
    padding: 13px 28px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 14px;
    transition: opacity 0.2s;
  }

  .dl-btn:hover { opacity: 0.85; }

  /* Error */
  #errorBox {
    display: none;
    margin-top: 20px;
    background: #2a0a10;
    border: 1px solid #5a1020;
    border-radius: 10px;
    padding: 14px 18px;
    color: #f75f6a;
    font-size: 13px;
  }

  /* Steps legend */
  .steps-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 16px;
  }

  .step-pill {
    background: var(--border);
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 11px;
    color: var(--muted);
    display: flex;
