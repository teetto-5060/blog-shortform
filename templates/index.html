<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog → 숏폼 변환기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #7c6af7;
    --accent2: #f75f6a;
    --text: #e8e8f0;
    --muted: #666680;
    --radius: 16px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
    background-image: radial-gradient(ellipse at 20% 10%, #1a0a3e55 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 80%, #3a0a1e33 0%, transparent 50%);
  }

  header {
    text-align: center;
    margin-bottom: 56px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #1e1a3a;
    border: 1px solid #3a2e7a;
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 12px;
    color: #a090f0;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .badge::before { content: "●"; color: #7c6af7; font-size: 8px; }

  h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    line-height: 1.15;
    letter-spacing: -0.03em;
  }

  h1 span { color: var(--accent); }
  h1 em { color: var(--accent2); font-style: normal; }

  .sub {
    color: var(--muted);
    font-size: 15px;
    margin-top: 12px;
    font-weight: 300;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px;
    width: 100%;
    max-width: 620px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .input-row {
    display: flex;
    gap: 10px;
  }

  input[type=url] {
    flex: 1;
    background: #0a0a0f;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type=url]:focus { border-color: var(--accent); }
  input[type=url]::placeholder { color: #44445a; }

  button#startBtn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px 24px;
    font-family: inherit;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  button#startBtn:hover { opacity: 0.88; }
  button#startBtn:active { transform: scale(0.97); }
  button#startBtn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Progress */
  #progress { display: none; margin-top: 32px; }

  .step-label {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
  }

  .step-label span { color: var(--accent); font-weight: 600; }

  .bar-bg {
    background: var(--border);
    border-radius: 999px;
    height: 6px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 999px;
    transition: width 0.5s ease;
    width: 0%;
  }

  .scenes-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-top: 20px;
  }

  .scene-dot {
    aspect-ratio: 9/16;
    border-radius: 8px;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #44445a;
    transition: all 0.3s;
    overflow: hidden;
    position: relative;
  }

  .scene-dot.done { border: 1px solid var(--accent); }
  .scene-dot.done::after {
    content: "✓";
    color: var(--accent);
    font-size: 14px;
  }

  /* Result */
  #result { display: none; margin-top: 32px; text-align: center; }

  .result-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .result-sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }

  video {
    width: 100%;
    max-width: 280px;
    border-radius: 12px;
    border: 1px solid var(--border);
    display: block;
    margin: 0 auto 20px;
  }

  .dl-btn {
    display: inline-block;
    background: var(--accent2);
    color: #fff;
    text-decoration: none;
    padding: 13px 28px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 14px;
    transition: opacity 0.2s;
  }

  .dl-btn:hover { opacity: 0.85; }

  /* Error */
  #errorBox {
    display: none;
    margin-top: 20px;
    background: #2a0a10;
    border: 1px solid #5a1020;
    border-radius: 10px;
    padding: 14px 18px;
    color: #f75f6a;
    font-size: 13px;
  }

  /* Steps legend */
  .steps-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 16px;
  }

  .step-pill {
    background: var(--border);
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .step-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
  .step-pill.active .dot { background: var(--accent); }
  .step-pill.active { color: var(--text); }
</style>
</head>
<body>

<header>
  <div class="badge">AI-Powered</div>
  <h1>블로그 URL → <span>숏폼</span> <em>영상</em></h1>
  <p class="sub">티스토리 · 네이버 블로그 · 브런치 URL 하나로<br>60초짜리 세로형 mp4를 자동 생성합니다</p>
</header>

<div class="card">
  <label>블로그 URL</label>
  <div class="input-row">
    <input type="url" id="urlInput" placeholder="https://blog.naver.com/..." />
    <button id="startBtn" onclick="startJob()">▶ 생성</button>
  </div>

  <div id="errorBox"></div>

  <div id="progress">
    <div class="step-label">
      <span id="stepText">준비 중...</span>
      <span id="pctText">0%</span>
    </div>
    <div class="bar-bg">
      <div class="bar-fill" id="barFill"></div>
    </div>
    <div class="scenes-grid" id="scenesGrid">
      <div class="scene-dot">1</div>
      <div class="scene-dot">2</div>
      <div class="scene-dot">3</div>
      <div class="scene-dot">4</div>
      <div class="scene-dot">5</div>
    </div>
    <div class="steps-legend">
      <div class="step-pill" id="pill-crawl"><div class="dot"></div>크롤링</div>
      <div class="step-pill" id="pill-script"><div class="dot"></div>대본</div>
      <div class="step-pill" id="pill-media"><div class="dot"></div>음성·이미지</div>
      <div class="step-pill" id="pill-ffmpeg"><div class="dot"></div>영상합성</div>
    </div>
  </div>

  <div id="result">
    <div class="result-title" id="videoTitle"></div>
    <div class="result-sub">✅ 영상이 완성됐어요!</div>
    <video id="videoPreview" controls playsinline></video>
    <a id="dlLink" class="dl-btn" download="shortform.mp4">⬇ mp4 다운로드</a>
  </div>
</div>

<script>
let pollTimer = null;
let currentJob = null;

async function startJob() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return;

  document.getElementById('startBtn').disabled = true;
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('progress').style.display = 'block';
  setBar(0, '시작 중...');
  resetDots();

  try {
    const res = await fetch('/generate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url})
    });
    const data = await res.json();
    currentJob = data.job_id;
    pollTimer = setInterval(poll, 2000);
  } catch(e) {
    showError('서버 연결 실패: ' + e.message);
  }
}

async function poll() {
  if (!currentJob) return;
  try {
    const res = await fetch('/status/' + currentJob);
    const data = await res.json();

    setBar(data.pct || 0, data.step || '');
    updatePills(data.step || '');
    updateDots(data.pct || 0);

    if (data.done) {
      clearInterval(pollTimer);
      showResult(data);
    } else if (data.error) {
      clearInterval(pollTimer);
      showError(data.step);
    }
  } catch(e) {}
}

function setBar(pct, text) {
  document.getElementById('barFill').style.width = pct + '%';
  document.getElementById('stepText').textContent = text;
  document.getElementById('pctText').textContent = pct + '%';
}

function updatePills(step) {
  const map = {
    'pill-crawl': '크롤링',
    'pill-script': '대본',
    'pill-media': '음성',
    'pill-ffmpeg': 'FFmpeg',
  };
  Object.entries(map).forEach(([id, keyword]) => {
    document.getElementById(id).classList.toggle('active', step.includes(keyword));
  });
}

function updateDots(pct) {
  const dots = document.querySelectorAll('.scene-dot');
  const completed = Math.floor((pct - 20) / 55 * 5);
  dots.forEach((d, i) => {
    d.classList.toggle('done', i < completed);
  });
}

function resetDots() {
  document.querySelectorAll('.scene-dot').forEach(d => d.classList.remove('done'));
}

function showResult(data) {
  document.getElementById('progress').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  document.getElementById('startBtn').disabled = false;
  if (data.title) document.getElementById('videoTitle').textContent = data.title;
  const url = data.file;
  document.getElementById('videoPreview').src = url;
  document.getElementById('dlLink').href = '/download/' + currentJob;
}

function showError(msg) {
  document.getElementById('startBtn').disabled = false;
  document.getElementById('progress').style.display = 'none';
  const box = document.getElementById('errorBox');
  box.style.display = 'block';
  box.textContent = '❌ ' + msg;
}
</script>
</body>
</html>
